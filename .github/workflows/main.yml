name: Compilar APK del Robot

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Qt with Bluetooth & Network
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtconnectivity'

      # CORRECCIÓN DEFINITIVA: Mapeamos la ruta del SDK y la versión de build-tools nativa de GitHub
      - name: Configure and Build CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}" \
            -DCMAKE_FIND_ROOT_PATH="${{ env.QT_ROOT_DIR }}" \
            -DQT_ANDROID_SDK_ROOT="$ANDROID_HOME" \
            -DQT_ANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -Dandroid_sdk_build_tools_revision="34.0.0" \
            -DCMAKE_BUILD_TYPE=Release
            
          cmake --build build

      # Dar permisos de ejecución a Gradle internos antes de empaquetar
      - name: Grant Gradle Permissions
        run: |
          if [ -f "build/android-build/gradlew" ]; then chmod +x build/android-build/gradlew; fi

      # Generar el archivo APK definitivo
      - name: Build Android APK
        run: |
          ${{ env.QT_ROOT_DIR }}/bin/androiddeployqt \
            --input build/android-project-deployment-settings.json \
            --output build/android-build \
            --apk build/android-build/robot_app.apk \
            --gradle \
            --release

      # Guardar el APK final para descargar en la pestaña de Actions
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Robot-App-APK
          path: build/android-build/robot_app.apk
