name: Compilar APK del Robot

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # PREVENCIÓN: Aceptar licencias de Android SDK
      - name: Accept Android SDK Licenses
        run: |
          yes | sdkmanager --licenses || true

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Qt with Bluetooth & Network
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtconnectivity'

      # PREVENCIÓN: Forzar variables del SDK/NDK para el compilador
      - name: Configure and Build CMake
        run: |
          export QT_ANDROID_SDK_BUILD_TOOLS_REVISION="34.0.0"
          
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}" \
            -DCMAKE_FIND_ROOT_PATH="${{ env.QT_ROOT_DIR }}" \
            -DQT_ANDROID_SDK_ROOT="$ANDROID_HOME" \
            -DQT_ANDROID_NDK_ROOT="$ANDROID_NDK_ROOT" \
            -DQT_ANDROID_SDK_BUILD_TOOLS_REVISION="34.0.0" \
            -DCMAKE_BUILD_TYPE=Release
            
          cmake --build build --target RobotControlPro

      - name: Create Build Directories
        run: |
          mkdir -p build/android-build

      # SOLUCIÓN: Usamos la ruta correcta del ejecutable en 'gcc_64' y exportamos variables críticas para Gradle
      - name: Build Android APK
        run: |
          export JAVA_HOME=$JAVA_HOME_17_X64
          export ANDROID_HOME=$ANDROID_HOME
          export ANDROID_NDK_ROOT=$ANDROID_NDK_ROOT
          
          /home/runner/work/controlrobot/Qt/6.7.0/gcc_64/bin/androiddeployqt \
            --input build/android-RobotControlPro-deployment-settings.json \
            --output build/android-build \
            --apk build/android-build/RobotControlPro.apk \
            --gradle \
            --release

      # Guardar el APK final para descargar
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: RobotControlPro-APK
          path: build/android-build/RobotControlPro.apk
