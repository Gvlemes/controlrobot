    # 1. Instalar Qt6 para Android en el entorno de GitHub
    - name: Install Qt
      uses: jurplel/install-qt-action@v4
      with:
        version: '6.x.x'       # Reemplaza por tu versión exacta de Qt (ej. 6.5.3 o 6.8.0)
        target: 'android'
        arch: 'android_arm64_v8a'

    # 2. Configurar el proyecto usando CMake (Aquí se corrige el error)
    - name: Configure CMake
      run: |
        cmake -B build \
          -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}" \
          -DANDROID_PLATFORM=android-33
