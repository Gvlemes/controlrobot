name: Compilar APK del Robot
on: [push]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar Android SDK y NDK
        uses: android-actions/setup-android@v3

      - name: Instalar Qt6 Oficial para Celular
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.2.4'
          target: 'android'
          arch: 'android_arm64_v8a'

      - name: Compilar APK del Robot
        run: |
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DQT_MANUAL_FINALIZATION=ON -DCMAKE_PREFIX_PATH="${{ env.Qt6_DIR }}"
          cmake --build build --target RobotControlPro_make_apk

      - name: Guardar APK Terminado
        uses: actions/upload-artifact@v4
        with:
          name: RobotControl-APK
          path: build/**/*.apk
