name: Compilar APK del Robot
on: [push]
jobs:
  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Configurar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: Instalar Android SDK y NDK
        uses: android-actions/setup-android@v3
      - name: Instalar Qt6 y Compilar APK
        run: |
          pip install aqtinstall
          python -m aqt install-qt android 6.2.4 android_arm64_v8a
          export PATH="$GITHUB_WORKSPACE/Qt/6.2.4/android_arm64_v8a/bin:$PATH"
          cmake -S . -B build -G "Ninja" -DCMAKE_BUILD_TYPE=Release -DCMAKE_TOOLCHAIN_FILE=$ANDROID_NDK_LATEST_HOME/build/cmake/android.toolchain.cmake -DANDROID_ABI=arm64-v8a -DQT_MANUAL_FINALIZATION=ON
          cmake --build build
      - name: Guardar APK Terminado
        uses: actions/upload-artifact@v4
        with:
          name: RobotControl-APK
          path: build/**/*.apk
