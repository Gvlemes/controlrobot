name: Compilar APK del Robot

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Build Tools
        run: |
          sudo apt-get update
          sudo apt-get install -y ninja-build

      - name: Install Qt with Bluetooth & Network
        uses: jurplel/install-qt-action@v4
        with:
          version: '6.7.0'
          target: 'android'
          arch: 'android_arm64_v8a'
          modules: 'qtconnectivity'

      # CORRECCIÓN: Quitamos la subcarpeta duplicada porque QT_ROOT_DIR ya la incluye completa
      - name: Configure and Build CMake
        run: |
          cmake -B build -G Ninja \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK_ROOT/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-33 \
            -DCMAKE_PREFIX_PATH="${{ env.QT_ROOT_DIR }}" \
            -DCMAKE_FIND_ROOT_PATH="${{ env.QT_ROOT_DIR }}"
            
          cmake --build build

      # Generar el archivo APK usando androiddeployqt
      - name: Build Android APK
        run: |
          ${{ env.QT_ROOT_DIR }}/bin/androiddeployqt \
            --input build/android-project-deployment-settings.json \
            --output build/android-build \
            --apk build/android-build/robot_app.apk \
            --gradle

      # Guardar el APK final para su descarga
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Robot-App-APK
          path: build/android-build/robot_app.apk
